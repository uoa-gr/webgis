<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>WebGIS</title>

  <meta property="og:title" content="WebGIS">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://uoa-gr.github.io/webgis/">

  <link rel="icon" href="data:,">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Italianno&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">

    <header class="masthead">
      <h1 class="masthead-title">
        <span class="rule" aria-hidden="true"></span>
        <span class="masthead-title-text">WebGIS</span>
        <span class="rule" aria-hidden="true"></span>
      </h1>
    </header>

    <section class="entries" id="entries"></section>

  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <template id="entry-template">
    <article class="entry">
      <div class="entry-rule" aria-hidden="true"></div>

      <header class="entry-head">
        <div class="entry-no" data-field="no"></div>
        <h2 class="entry-title" data-field="title"></h2>
      </header>

      <figure class="entry-quickview">
        <a class="entry-quickview-link" target="_blank" rel="noopener" data-field="quickviewLink">
          <img class="entry-quickview-img" alt="" loading="lazy" data-field="quickviewImg">
        </a>
        <figcaption class="entry-cap">
          <span class="entry-cap-label">Quickview</span>
          <button class="action" data-act="copy-quickview">Copy&nbsp;PNG</button>
          <a class="action" data-act="download-quickview" download>Download</a>
        </figcaption>
      </figure>

      <div class="entry-aside">
        <div class="entry-link">
          <span class="entry-link-label">URL</span>
          <a class="entry-link-url" target="_blank" rel="noopener" data-field="url"></a>
          <button class="action" data-act="copy-link">Copy</button>
        </div>

        <figure class="entry-qr">
          <div class="entry-qr-frame">
            <img class="entry-qr-img" alt="" loading="lazy" data-field="qrImg">
          </div>
          <figcaption class="entry-cap">
            <span class="entry-cap-label">QR</span>
            <button class="action" data-act="copy-qr">Copy&nbsp;PNG</button>
            <a class="action" data-act="download-qr" download>Download</a>
          </figcaption>
        </figure>
      </div>

    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
